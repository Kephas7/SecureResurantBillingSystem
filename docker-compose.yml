version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # DATABASE_URL/REDIS_HOST/REDIS_PORT in .env point at "localhost"
      # for host-side (non-Docker) development, since that's how the app
      # reaches these containers' mapped ports when run locally with
      # `npm run start:dev`. Inside this container "localhost" is the
      # container itself, not the host - so these three are explicitly
      # overridden here to use the docker-compose service names/internal
      # ports instead. Everything else the api needs (secrets, WEB_ORIGIN,
      # etc.) still comes from the shared .env via env_file above.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      # Uploaded menu item images (see UploadService) - without this,
      # they'd live only on the container's writable layer and be lost
      # every time the container is recreated (e.g. `docker compose up
      # --build`). Not a substitute for real backups.
      - uploads_data:/app/uploads
    networks:
      - internal
      - public

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are inlined into the client bundle at build
        # time, not read at container startup - so they must be passed
        # as build args here rather than as runtime `environment:`.
        # http://localhost:4000 is correct because this URL is used by
        # the *browser* (on the host), which reaches the api container
        # through its mapped port - not by one container calling another.
        NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-4000}
        NEXT_PUBLIC_CAPTCHA_SITE_KEY: ${NEXT_PUBLIC_CAPTCHA_SITE_KEY:-}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    env_file: .env
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - public

volumes:
  postgres_data:
  uploads_data:

networks:
  # NOTE (security decision, document in report): in production this network
  # would be set `internal: true` so postgres/redis have no route out of the
  # Docker network. Kept reachable here only so you can connect a local DB
  # client during development; remove the host port mappings above before
  # any deployment beyond your own machine.
  internal:
    driver: bridge
  public:
    driver: bridge

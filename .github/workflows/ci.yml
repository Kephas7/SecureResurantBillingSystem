name: CI

# The CI pipeline enforces security at the development level: dependency
# vulnerability scanning (npm audit), secrets detection (trufflehog), and
# verification that no .env file is committed. These checks run on every
# push and pull request (OWASP A08: Software and Data Integrity Failures
# - supply chain).

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  api:
    name: API - lint, audit, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Fails the build on high or critical severity vulnerabilities -
      # no continue-on-error. A vulnerable dependency is a real attack
      # surface, not a warning to note and move past.
      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

  web:
    name: Web - lint, audit, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

  docker-build:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t restaurant-secure-api:ci ./api

      - name: Build Web image
        run: docker build -t restaurant-secure-web:ci ./web

  security-checks:
    name: Secrets scan and .env commit check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets in code
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Check .env not committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env file is committed to the repository!"
            exit 1
          fi
          echo ".env not committed — OK"

  all-checks:
    name: All security checks passed
    runs-on: ubuntu-latest
    needs: [api, web, docker-build, security-checks]
    steps:
      - run: echo "All checks passed"

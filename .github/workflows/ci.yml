name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  api:
    name: API - lint, audit, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
        continue-on-error: true # report findings without blocking early scaffold builds

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

  web:
    name: Web - lint, audit, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Dependency vulnerability audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: npm run build

  docker-build:
    name: Build container images
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t restaurant-secure-api:ci ./api

      - name: Build Web image
        run: docker build -t restaurant-secure-web:ci ./web
